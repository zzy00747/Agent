# Mini Agent TS Configuration Example
#
# NOTE: Every option here can also be set via environment variables.
# Env vars take precedence over this file. Prefix with MINI_AGENT_ and use
# double underscores for nested keys:
#   MINI_AGENT_API_KEY=sk-xxx
#   MINI_AGENT_MODEL=MiniMax-M2.5
#   MINI_AGENT_RETRY__ENABLED=false

# ===== LLM Configuration =====
# MiniMax API Configuration
# MiniMax provides both global and China platforms:
# - Global: https://platform.minimax.io -> api_base: https://api.minimax.io
# - China: https://platform.minimaxi.com -> api_base: https://api.minimaxi.com
apiKey: 'YOUR_API_KEY_HERE'
apiBase: 'https://api.minimaxi.com/v1/' # Note the trailing slash /
model: 'MiniMax-M2.5'
provider: 'openai' # MiniMax uses OpenAI-style authentication

# ===== Logging Configuration =====
enableLogging: false # Enable file logging to project-root/logs/

# ===== Agent Configuration =====
maxSteps: 100 # Maximum execution steps
systemPromptPath: 'system_prompt.md' # System prompt file (same config directory)

# ===== Retry Configuration =====
retry:
  enabled: true # Enable retry mechanism
  maxRetries: 3 # Maximum number of retries

# ===== Tools Configuration =====
tools:
  skillsDir: './skills' # Directory containing skills (each skill is a folder with SKILL.md)
  mcpConfigPath: 'mcp.json' # MCP configuration file path
  maxToolResultTokens: 8000 # Truncate oversized tool results to this many tokens
  mcp:
    connectTimeout: 10.0
    executeTimeout: 60.0
    sseReadTimeout: 120.0
    heartbeatInterval: 30.0 # seconds, 0 to disable
    maxReconnectAttempts: 3
    reconnectDelay: 1000 # milliseconds
  security:
    bash:
      blockedPatterns: [] # Additional regex patterns to block
      allowedPatterns: [] # Regex patterns that bypass the blocklist
      allowDangerousCommands: false # Set true to allow rm/del/format/mkfs/dd

# ===== Session History Configuration =====
history:
  autoSave: true # Automatically save conversation history after each turn
  maxHistoryTokens: 0 # Token budget for history (0 = unlimited); old messages are summarized when exceeded
